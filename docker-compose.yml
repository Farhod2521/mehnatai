version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: mehnatai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mehnatai
      POSTGRES_PASSWORD: mehnatai_secret
      POSTGRES_DB: mehnatai_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mehnatai -d mehnatai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./mehnatai-backend
      dockerfile: Dockerfile
    container_name: mehnatai_backend
    restart: unless-stopped
    env_file: ./mehnatai-backend/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "5555:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./mehnatai-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.testyarat.uz/api/v1
    container_name: mehnatai_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "3200:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
